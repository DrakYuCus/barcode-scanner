<!DOCTYPE html>
<html>
<head>
  <title>Barcode Scanner</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>

    body {
      margin: 0;
      background: #0f172a;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .container {
      padding: 16px;
      max-width: 600px;
      margin: auto;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 6px;
    }

    .subtitle {
      color: #94a3b8;
      margin-bottom: 16px;
      font-size: 14px;
    }

    #reader {
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      background: black;
      border: 2px solid #334155;
      margin-top: 14px;
    }

    .card {
      background: #111827;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 14px;
      margin-top: 14px;
    }

    .label {
      color: #94a3b8;
      font-size: 13px;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    #lastBarcode {
      font-size: 22px;
      font-weight: bold;
      word-break: break-all;
    }

    #status {
      color: #22c55e;
      font-weight: bold;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border: none;
      border-radius: 12px;
      background: #16a34a;
      color: white;
      font-size: 16px;
      font-weight: bold;
    }

    button.secondary {
      background: #334155;
    }

    input[type="number"] {
      width: 100%;
      box-sizing: border-box;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #334155;
      background: #0f172a;
      color: white;
      font-size: 20px;
      text-align: center;
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>Barcode Scanner</h1>

    <div class="subtitle">
      Scan items to update your Google Sheet
    </div>

    <div class="card">

      <div class="label">
        Quantity To Add
      </div>

      <input
        id="quantityInput"
        type="number"
        value="1"
        min="1"
      >

    </div>

    <div id="reader"></div>

    <div class="card">

      <div class="label">
        Last scanned
      </div>

      <div id="lastBarcode">
        Nothing scanned yet
      </div>

    </div>

    <div class="card">

      <div class="label">
        Status
      </div>

      <div id="status">
        Scanner ready
      </div>

    </div>

    <button onclick="startScanner()">
      Start Scanner
    </button>

    <button class="secondary" onclick="copyLast()">
      Copy Last Barcode
    </button>

  </div>

<script>

const TOKEN =
  "dan123secure";

const API_URL =
  "https://script.google.com/macros/s/AKfycbxDNbAXSIPQziCLt2R3VFupWK0m_TP_aJ0Cob9hKpmFd6pQpsy3bqcSLjZ97pQHiWR3/exec";

let scanner;

let scannerStarted = false;

let lastScan = "";

let lastScanTime = 0;

let isSending = false;

let lockedBarcode = null;

let barcodeVisibleUntil = 0;

const COOLDOWN = 2000;

const VISIBLE_GRACE_MS = 800;

const AWAY_TIME_MS = 1200;

function setStatus(text, good = true) {

  const status =
    document.getElementById("status");

  status.textContent = text;

  status.style.color =
    good ? "#22c55e" : "#ef4444";
}

function startScanner() {

  if (scannerStarted) return;

  scanner =
    new Html5Qrcode("reader");

  scanner.start(

    { facingMode: "environment" },

    {
      fps: 10,

      qrbox: {
        width: 320,
        height: 140
      },

      formatsToSupport: [
        Html5QrcodeSupportedFormats.EAN_13
      ]
    },

    onScanSuccess,

    onScanFailure

  ).then(() => {

    scannerStarted = true;

    setStatus(
      "Scanner running"
    );

  }).catch(err => {

    console.error(err);

    setStatus(
      "Camera failed to start",
      false
    );

  });

}

function onScanFailure() {

  releaseLockIfBarcodeGone();

}

function lockBarcode(text) {

  lockedBarcode = text;

  barcodeVisibleUntil =
    Date.now() + VISIBLE_GRACE_MS;
}

function refreshVisibleBarcode(decodedText) {

  if (
    lockedBarcode &&
    decodedText === lockedBarcode
  ) {

    barcodeVisibleUntil =
      Date.now() + VISIBLE_GRACE_MS;
  }
}

function releaseLockIfBarcodeGone() {

  if (!lockedBarcode) return;

  const now = Date.now();

  if (
    now >
    (barcodeVisibleUntil + AWAY_TIME_MS)
  ) {

    lockedBarcode = null;

    setStatus(
      "Ready for next scan"
    );
  }
}

async function onScanSuccess(decodedText) {

  refreshVisibleBarcode(decodedText);

  if (isSending) return;

  if (
    lockedBarcode &&
    decodedText === lockedBarcode
  ) {
    return;
  }

  const now = Date.now();

  if (
    decodedText === lastScan &&
    (now - lastScanTime) < COOLDOWN
  ) {
    return;
  }

  isSending = true;

  lastScan = decodedText;

  lastScanTime = now;

  lockBarcode(decodedText);

  try {

    const quantity =
      Number(
        document.getElementById(
          "quantityInput"
        ).value
      ) || 1;

    document.getElementById(
      "lastBarcode"
    ).textContent = decodedText;

    setStatus(
      "Sending to sheet..."
    );

    await fetch(API_URL, {

      method: "POST",

      body: JSON.stringify({

        barcode: decodedText,

        quantity: quantity,

        token: TOKEN

      })

    });

    setStatus(
      "Saved to Google Sheet +" +
      quantity
    );

    if (navigator.vibrate) {
      navigator.vibrate(120);
    }

  } catch (err) {

    console.error(err);

    setStatus(
      "Failed to send to sheet",
      false
    );

  }

  isSending = false;
}

function copyLast() {

  if (!lastScan) return;

  navigator.clipboard.writeText(
    lastScan
  );

  setStatus(
    "Barcode copied"
  );
}

</script>

</body>
</html>

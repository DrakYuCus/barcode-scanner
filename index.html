<!DOCTYPE html>
<html>
<head>
<title>Barcode Scanner</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
    margin:0;
    background:#0f172a;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
}

.container{
    max-width:600px;
    margin:auto;
    padding:10px;
}

h1{
    margin:5px 0;
    font-size:22px;
}

.subtitle{
    color:#94a3b8;
    font-size:12px;
    margin-bottom:8px;
}

.card{
    background:#111827;
    border:1px solid #334155;
    border-radius:12px;
    padding:8px;
    margin-top:8px;
}

.label{
    color:#94a3b8;
    font-size:11px;
    text-transform:uppercase;
}

#reader{
    width:100%;
    margin-top:8px;
    border-radius:12px;
    overflow:hidden;
    border:2px solid #334155;
}

#lastBarcode{
    font-size:16px;
    font-weight:bold;
    word-break:break-all;
}

#status{
    font-size:16px;
    font-weight:bold;
    color:#22c55e;
}

.infoRow{
    display:flex;
    gap:8px;
    margin-top:8px;
}

.infoRow .card{
    flex:1;
    margin-top:0;
}

input[type="number"]{
    width:100%;
    box-sizing:border-box;
    padding:10px;
    font-size:18px;
    text-align:center;
    border-radius:10px;
    border:1px solid #334155;
    background:#0f172a;
    color:white;
}

button{
    width:100%;
    padding:12px;
    margin-top:8px;
    border:none;
    border-radius:10px;
    background:#16a34a;
    color:white;
    font-size:16px;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>Barcode Scanner</h1>

<div class="subtitle">
Google Sheet Stock Counter
</div>

<div class="card">
<div class="label">Quantity To Add</div>

<input
id="quantityInput"
type="number"
value="1"
min="1">
</div>

<div id="reader"></div>

<div class="infoRow">

<div class="card">
<div class="label">Last Scan</div>
<div id="lastBarcode">None</div>
</div>

<div class="card">
<div class="label">Status</div>
<div id="status">Ready</div>
</div>

</div>

<button onclick="startScanner()">
Start Scanner
</button>

</div>

<script>

const TOKEN =
"dan123secure";

const API_URL =
"https://script.google.com/macros/s/AKfycbxDNbAXSIPQziCLt2R3VFupWK0m_TP_aJ0Cob9hKpmFd6pQpsy3bqcSLjZ97pQHiWR3/exec";

let scanner;
let scannerStarted = false;

let lastScan = "";
let lastScanTime = 0;

let isSending = false;

let lockedBarcode = null;
let barcodeVisibleUntil = 0;

const COOLDOWN = 2000;
const VISIBLE_GRACE_MS = 800;
const AWAY_TIME_MS = 1200;

function setStatus(text, good=true){

    const status =
    document.getElementById("status");

    status.textContent = text;

    status.style.color =
    good ? "#22c55e" : "#ef4444";
}

function startScanner(){

    if(scannerStarted) return;

    scanner =
    new Html5Qrcode("reader");

    scanner.start(

        { facingMode:"environment" },

        {
            fps:10,

            qrbox:{
                width:260,
                height:100
            },

            formatsToSupport:[
                Html5QrcodeSupportedFormats.EAN_13
            ]
        },

        onScanSuccess,

        onScanFailure

    ).then(()=>{

        scannerStarted = true;

        setStatus("Running");

    }).catch(err=>{

        console.error(err);

        setStatus(
            "Camera Error",
            false
        );
    });
}

function onScanFailure(){

    releaseLockIfBarcodeGone();
}

function lockBarcode(text){

    lockedBarcode = text;

    barcodeVisibleUntil =
    Date.now() + VISIBLE_GRACE_MS;
}

function refreshVisibleBarcode(decodedText){

    if(
        lockedBarcode &&
        decodedText === lockedBarcode
    ){

        barcodeVisibleUntil =
        Date.now() + VISIBLE_GRACE_MS;
    }
}

function releaseLockIfBarcodeGone(){

    if(!lockedBarcode) return;

    const now = Date.now();

    if(
        now >
        (barcodeVisibleUntil + AWAY_TIME_MS)
    ){

        lockedBarcode = null;

        setStatus("Ready");
    }
}

async function onScanSuccess(decodedText){

    refreshVisibleBarcode(decodedText);

    if(isSending) return;

    if(
        lockedBarcode &&
        decodedText === lockedBarcode
    ){
        return;
    }

    const now = Date.now();

    if(
        decodedText === lastScan &&
        (now - lastScanTime) < COOLDOWN
    ){
        return;
    }

    isSending = true;

    lastScan = decodedText;
    lastScanTime = now;

    lockBarcode(decodedText);

    try{

        const quantity =
        Number(
            document.getElementById(
                "quantityInput"
            ).value
        ) || 1;

        document.getElementById(
            "lastBarcode"
        ).textContent = decodedText;

        setStatus("Saving...");

        await fetch(API_URL,{

            method:"POST",

            body:JSON.stringify({

                barcode:decodedText,

                quantity:quantity,

                token:TOKEN

            })
        });

        setStatus(
            "Saved +" + quantity
        );

        if(navigator.vibrate){
            navigator.vibrate(120);
        }

    }catch(err){

        console.error(err);

        setStatus(
            "Failed",
            false
        );
    }

    isSending = false;
}

</script>

</body>
</html>

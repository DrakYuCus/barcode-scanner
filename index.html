<!DOCTYPE html>
<html>
<head>
  <title>Barcode Scanner</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body style="background:#111;color:white;text-align:center;padding:20px;">

<h2>Scanner</h2>
<div id="reader" style="width:100%"></div>

<script>
const TOKEN = "dan123secure";
const API_URL = "https://script.google.com/macros/s/AKfycbxDNbAXSIPQziCLt2R3VFupWK0m_TP_aJ0Cob9hKpmFd6pQpsy3bqcSLjZ97pQHiWR3/exec";

let lastScan = "";
let lastScanTime = 0;
const COOLDOWN = 2000;

const scanner = new Html5Qrcode("reader");

scanner.start(
  { facingMode: "environment" },
  { fps: 10 },
  (decodedText) => {

    const now = Date.now();

    // Prevent rapid duplicate scans
    if (decodedText === lastScan && (now - lastScanTime) < COOLDOWN) {
      return;
    }

    lastScan = decodedText;
    lastScanTime = now;

    fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({
        barcode: decodedText,
        token: TOKEN
      })
    });

    if (navigator.vibrate) navigator.vibrate(100);

    console.log("Sent:", decodedText);
  }
);
</script>

</body>
</html>

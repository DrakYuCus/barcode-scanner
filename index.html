<script>
const TOKEN = "dan123secure";
const API_URL = "https://script.google.com/macros/s/AKfycbxDNbAXSIPQziCLt2R3VFupWK0m_TP_aJ0Cob9hKpmFd6pQpsy3bqcSLjZ97pQHiWR3/exec";

let scanner;
let scannerStarted = false;
let lastScan = "";
let lastScanTime = 0;
let isSending = false;

const COOLDOWN = 3000;

function setStatus(text, good = true) {
  const status = document.getElementById("status");
  status.textContent = text;
  status.style.color = good ? "#22c55e" : "#ef4444";
}

function startScanner() {
  if (scannerStarted) return;

  scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    {
      fps: 10,
      qrbox: { width: 320, height: 140 },
      formatsToSupport: [
        Html5QrcodeSupportedFormats.EAN_13
      ]
    },
    onScanSuccess
  ).then(() => {
    scannerStarted = true;
    setStatus("Scanner running");
  }).catch(err => {
    setStatus("Camera failed to start", false);
    console.error(err);
  });
}

async function onScanSuccess(decodedText) {

  if (isSending) return;

  isSending = true;

  try {

    const now = Date.now();

    if (decodedText === lastScan && (now - lastScanTime) < COOLDOWN) {
      isSending = false;
      return;
    }

    lastScan = decodedText;
    lastScanTime = now;

    let quantity = 1;

    if (document.getElementById("manualQtyToggle").checked) {

      const entered = prompt(
        "Enter quantity for " + decodedText,
        "1"
      );

      if (entered === null) {
        setStatus("Scan cancelled", false);

        setTimeout(() => {
          isSending = false;
        }, 3000);

        return;
      }

      quantity = Number(entered);

      if (!quantity || quantity < 1) {

        setStatus("Invalid quantity", false);

        setTimeout(() => {
          isSending = false;
        }, 3000);

        return;
      }
    }

    document.getElementById("lastBarcode").textContent = decodedText;

    setStatus("Sending to sheet...");

    await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({
        barcode: decodedText,
        quantity: quantity,
        token: TOKEN
      })
    });

    setStatus("Saved to Google Sheet +" + quantity);

    if (navigator.vibrate) {
      navigator.vibrate(120);
    }

  } catch (err) {

    console.error(err);

    setStatus("Failed to send to sheet", false);

  }

  setTimeout(() => {
    isSending = false;
  }, 3000);
}

function copyLast() {

  if (!lastScan) return;

  navigator.clipboard.writeText(lastScan);

  setStatus("Barcode copied");
}
</script>
